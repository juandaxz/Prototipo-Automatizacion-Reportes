<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reporte de Ruta</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#2563eb">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Reporte de Ruta">
    <style>
        * { box-sizing: border-box; }
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
        }

        .hidden { display: none; }
        .block { display: block; }
        .relative { position: relative; }
        .w-full { width: 100%; }
        .max-w-md { max-width: 28rem; }
        .mx-auto { margin-left: auto; margin-right: auto; }
        .mt-4 { margin-top: 1rem; }
        .mb-2 { margin-bottom: .5rem; }
        .mb-6 { margin-bottom: 1.5rem; }
        .p-3 { padding: .75rem; }
        .p-4 { padding: 1rem; }
        .p-6 { padding: 1.5rem; }
        .px-4 { padding-left: 1rem; padding-right: 1rem; }
        .py-3 { padding-top: .75rem; padding-bottom: .75rem; }
        .py-4 { padding-top: 1rem; padding-bottom: 1rem; }
        .gap-2 { gap: .5rem; }
        .gap-3 { gap: .75rem; }

        .flex { display: flex; }
        .flex-col { flex-direction: column; }
        .items-center { align-items: center; }
        .justify-center { justify-content: center; }

        .space-y-6 > * + * { margin-top: 1.5rem; }

        .text-center { text-align: center; }
        .text-sm { font-size: .875rem; }
        .text-lg { font-size: 1.125rem; }
        .text-xl { font-size: 1.25rem; }
        .text-2xl { font-size: 1.5rem; }
        .font-medium { font-weight: 500; }
        .font-bold { font-weight: 700; }

        .rounded-lg { border-radius: .5rem; }
        .rounded-xl { border-radius: .75rem; }
        .border { border-width: 1px; border-style: solid; }
        .border-2 { border-width: 2px; border-style: solid; }
        .border-dashed { border-style: dashed; }
        .border-gray-700 { border-color: #2d2d2d; }
        .border-gray-600 { border-color: #4b5563; }

        .bg-gray-800 { background-color: #1e1e1e; }
        .bg-gray-700 { background-color: #2d2d2d; }
        .bg-blue-600 { background-color: #2563eb; }
        .bg-blue-700 { background-color: #1d4ed8; }
        .bg-green-900\/50 { background-color: rgba(20, 83, 45, 0.5); }
        .bg-red-900\/50 { background-color: rgba(127, 29, 29, 0.5); }
        .bg-yellow-900\/50 { background-color: rgba(113, 63, 18, 0.5); }

        .text-white { color: #fff; }
        .text-gray-300 { color: #d1d5db; }
        .text-gray-400 { color: #9ca3af; }
        .text-green-400 { color: #4ade80; }
        .text-red-400 { color: #f87171; }
        .text-yellow-400 { color: #facc15; }

        .outline-none { outline: none; }
        .appearance-none { appearance: none; }
        .object-cover { object-fit: cover; }
        .max-h-64 { max-height: 16rem; }
        .h-10 { height: 2.5rem; }
        .w-10 { width: 2.5rem; }
        .h-6 { height: 1.5rem; }
        .w-6 { width: 1.5rem; }
        .shadow-lg { box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.35), 0 4px 6px -4px rgba(0, 0, 0, 0.35); }
        .transition-colors { transition: background-color .2s ease, border-color .2s ease, color .2s ease; }

        .hover\:bg-gray-700:hover { background-color: #2d2d2d; }
        .hover\:bg-blue-700:hover { background-color: #1d4ed8; }
        .focus\:ring-2:focus { box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.8); }
        .focus\:ring-blue-500:focus { box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.8); }

        @keyframes fadeInUp {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .animate-fade-in-up {
            animation: fadeInUp .4s ease-out forwards;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .animate-spin {
            animation: spin 1s linear infinite;
        }

        input, select, button {
            color: inherit;
            font: inherit;
        }

        select, button, input[type="file"]::file-selector-button {
            min-height: 3.5rem;
        }

        button {
            cursor: pointer;
            border: none;
        }

        button:disabled {
            opacity: .7;
            cursor: not-allowed;
        }
    </style>
</head>
<body class="p-4 max-w-md mx-auto">
    <div id="offlineBanner" class="hidden" style="background:#713f12;color:#fef08a;text-align:center;padding:.6rem 1rem;font-size:.85rem;font-weight:600;border-radius:.5rem;margin-bottom:1rem;">
        ⚠️ Sin conexión — el reporte se guardará y enviará automáticamente cuando recuperes señal
    </div>
    <h1 class="text-2xl font-bold mb-6 text-center">Reporte de Ruta</h1>
    
    <form id="reportForm" class="space-y-6">
        <div>
            <label class="block text-sm font-medium mb-2 text-gray-300">Chofer</label>
            <input id="chofer" type="text" required placeholder="Escribe el nombre del chofer" class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-lg focus:ring-2 focus:ring-blue-500 outline-none">
        </div>

        <div>
            <label class="block text-sm font-medium mb-2 text-gray-300">Empresa</label>
            <select id="empresa" required class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-lg focus:ring-2 focus:ring-blue-500 outline-none appearance-none">
                <option value="" disabled selected>Seleccionar Empresa</option>
                <option value="AQUAGOLD">AQUAGOLD</option>
                <option value="KUBIEC">KUBIEC</option>
                <option value="MABE">MABE</option>
                <option value="SUPERIOR">SUPERIOR</option>
                <option value="SUPRAPLAST">SUPRAPLAST</option>
                <option value="GRUPASA">GRUPASA</option>
            </select>
        </div>

        <div>
            <label class="block text-sm font-medium mb-2 text-gray-300">Rutas</label>
            <select id="ruta" required class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-lg focus:ring-2 focus:ring-blue-500 outline-none appearance-none">
                <option value="" disabled selected>Seleccionar Ruta</option>
                <option value="Norte">Norte</option>
                <option value="Sur">Sur</option>
                <option value="Avanzada Norte">Avanzada Norte</option>
                <option value="Duran">Duran</option>
            </select>
        </div>

        <div>
            <label class="block text-sm font-medium mb-2 text-gray-300">Tipo de Registro</label>
            <select id="tipo" required class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-lg focus:ring-2 focus:ring-blue-500 outline-none appearance-none">
                <option value="" disabled selected>Seleccionar Tipo</option>
                <option value="Ingreso">Ingreso</option>
                <option value="Salida">Salida</option>
            </select>
        </div>

        <div>
            <label class="block text-sm font-medium mb-2 text-gray-300">Evidencia Fotográfica</label>
            <div class="relative">
                <input type="file" id="foto" accept="image/*" capture="environment" required class="hidden">
                <button type="button" onclick="document.getElementById('foto').click()" class="w-full bg-gray-800 border-2 border-dashed border-gray-600 rounded-xl p-6 flex flex-col items-center justify-center gap-3 hover:bg-gray-700 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
                    </svg>
                    <span class="text-lg font-medium text-gray-300">Tomar Foto</span>
                </button>
            </div>
            <img id="preview" class="mt-4 rounded-xl w-full hidden object-cover max-h-64" alt="Vista previa">
        </div>

        <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl px-4 py-4 text-xl shadow-lg transition-colors flex justify-center items-center gap-2">
            <span>Enviar Reporte</span>
        </button>
    </form>

    <div id="status" class="mt-4 text-center text-sm font-medium hidden p-3 rounded-lg"></div>

    <script>
        // ==========================================
        // CONFIGURACIÓN: PEGA AQUÍ TU URL DE GOOGLE APPS SCRIPT
        // ==========================================
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby8uSGEMLsgJiug--T74Dp-KFDUFEI2m-gm_dtpg7fFjY4cdI1jdnqb4Wcqoihy6Y4Kug/exec'; 
        
        // Elementos DOM
        const form = document.getElementById('reportForm');
        const fotoInput = document.getElementById('foto');
        const preview = document.getElementById('preview');
        const submitBtn = document.getElementById('submitBtn');
        const statusDiv = document.getElementById('status');

        function triggerConfetti() {
            if (typeof window.confetti === 'function') {
                window.confetti({
                    particleCount: 100,
                    spread: 70,
                    origin: { y: 0.6 },
                    colors: ['#3b82f6', '#10b981', '#f59e0b', '#ef4444']
                });
            }
        }
        let base64Image = null;
        let currentCoords = { lat: null, lon: null };

        // Mostrar vista previa y comprimir imagen
        fotoInput.addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (!file) return;

            showStatus('Procesando imagen y ubicación...', 'loading');
            
            try {
                currentCoords = await getLocation();
            } catch (geoErr) {
                console.warn('No se pudo obtener ubicación:', geoErr);
            }

            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    // Comprimir con Canvas
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 800;
                    let width = img.width;
                    let height = img.height;

                    if (width > MAX_WIDTH) {
                        height = Math.round((height * MAX_WIDTH) / width);
                        width = MAX_WIDTH;
                    }

                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);

                    // --- AGREGAR OVERLAY (MARCA DE AGUA) ---
                    const choferInput = document.getElementById('chofer').value.trim();
                    const choferName = choferInput ? choferInput.toUpperCase() : 'SIN NOMBRE';
                    
                    const now = new Date();
                    const dateStr = now.toLocaleDateString('es-ES');
                    const timeStr = now.toLocaleTimeString('es-ES');
                    const locStr = (currentCoords.lat && currentCoords.lon) 
                        ? `${currentCoords.lat.toFixed(5)}, ${currentCoords.lon.toFixed(5)}` 
                        : 'Ubicación desconocida';

                    const textLines = [
                        `Chofer: ${choferName}`,
                        `Fecha: ${dateStr}`,
                        `Hora: ${timeStr}`,
                        `Ubicación: ${locStr}`
                    ];

                    const fontSize = Math.max(12, Math.floor(width * 0.025)); // Reducido de 0.035 a 0.025
                    ctx.font = `${fontSize}px system-ui, -apple-system, sans-serif`;
                    ctx.textBaseline = 'top';
                    
                    const padding = Math.floor(fontSize * 0.5); // Reducido de 0.8 a 0.5
                    const lineHeight = Math.floor(fontSize * 1.2); // Reducido de 1.4 a 1.2
                    
                    let maxWidth = 0;
                    textLines.forEach(line => {
                        const metrics = ctx.measureText(line);
                        if (metrics.width > maxWidth) maxWidth = metrics.width;
                    });
                    
                    const rectWidth = maxWidth + (padding * 2);
                    const rectHeight = (textLines.length * lineHeight) + (padding * 2) - (lineHeight - fontSize);
                    
                    const margin = Math.floor(width * 0.02);
                    const startX = width - rectWidth - margin;
                    const startY = height - rectHeight - margin;
                    
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
                    if (ctx.roundRect) {
                        ctx.beginPath();
                        ctx.roundRect(startX, startY, rectWidth, rectHeight, 8);
                        ctx.fill();
                    } else {
                        ctx.fillRect(startX, startY, rectWidth, rectHeight);
                    }
                    
                    ctx.fillStyle = '#ffffff';
                    textLines.forEach((line, index) => {
                        ctx.fillText(line, startX + padding, startY + padding + (index * lineHeight));
                    });
                    // --- FIN OVERLAY ---

                    // Convertir a base64 (JPEG, 0.7 calidad)
                    base64Image = canvas.toDataURL('image/jpeg', 0.7);
                    
                    // Mostrar preview
                    preview.src = base64Image;
                    preview.classList.remove('hidden');
                    
                    statusDiv.classList.add('hidden'); // Ocultar mensaje de carga
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        // Obtener ubicación
        function getLocation() {
            return new Promise((resolve, reject) => {
                if (!navigator.geolocation) {
                    reject(new Error('Geolocalización no soportada'));
                } else {
                    navigator.geolocation.getCurrentPosition(
                        pos => resolve({ lat: pos.coords.latitude, lon: pos.coords.longitude }),
                        err => reject(err),
                        { enableHighAccuracy: true, timeout: 10000 }
                    );
                }
            });
        }

        // Mostrar estado
        function showStatus(message, type) {
            statusDiv.textContent = message;
            
            // Remove animation class temporarily to re-trigger it
            statusDiv.classList.remove('animate-fade-in-up');
            void statusDiv.offsetWidth; // Force reflow to restart animation
            
            statusDiv.className = `mt-4 text-center text-sm font-medium p-3 rounded-lg block animate-fade-in-up ${
                type === 'success' ? 'bg-green-900/50 text-green-400' : 
                type === 'error' ? 'bg-red-900/50 text-red-400' : 
                'bg-yellow-900/50 text-yellow-400'
            }`;
            
            if (type !== 'loading') {
                setTimeout(() => {
                    statusDiv.classList.add('hidden');
                }, 5000);
            }
        }

        // Manejar envío
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (!base64Image) {
                showStatus('Por favor toma una foto primero', 'error');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<svg class="animate-spin h-6 w-6 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Procesando...';

            try {
                // Si no se obtuvo la ubicación al tomar la foto, intentar de nuevo
                if (!currentCoords.lat || !currentCoords.lon) {
                    showStatus('Obteniendo ubicación...', 'loading');
                    try {
                        currentCoords = await getLocation();
                    } catch (geoErr) {
                        console.warn('No se pudo obtener ubicación:', geoErr);
                    }
                }

                let rawChofer = document.getElementById('chofer').value;
                let cleanChofer = rawChofer.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toUpperCase();

                const payload = {
                    timestamp: new Date().toISOString(),
                    chofer: cleanChofer,
                    empresa: document.getElementById('empresa').value,
                    ruta: document.getElementById('ruta').value,
                    tipo: document.getElementById('tipo').value,
                    lat: currentCoords.lat,
                    lon: currentCoords.lon,
                    foto_base64: base64Image.split(',')[1] // Quitar el header data:image/jpeg;base64,
                };

                if (!navigator.onLine) {
                    saveOffline(payload);
                    showStatus('Guardado sin conexión. Se enviará cuando haya internet.', 'warning');
                    resetForm();
                } else {
                    showStatus('Enviando reporte...', 'loading');
                    await sendData(payload);
                    showStatus('Reporte enviado con éxito', 'success');
                    triggerConfetti();
                    resetForm();
                }
            } catch (error) {
                console.error(error);
                showStatus('Error al enviar: ' + error.message, 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<span>Enviar Reporte</span>';
            }
        });

        // Guardar offline
        function saveOffline(payload) {
            const queue = JSON.parse(localStorage.getItem('reportQueue') || '[]');
            queue.push(payload);
            localStorage.setItem('reportQueue', JSON.stringify(queue));
        }

        // Enviar datos
        async function sendData(payload) {
            if (SCRIPT_URL === 'TU_URL_DE_GOOGLE_APPS_SCRIPT_AQUI') {
                throw new Error('Falta configurar la URL de Apps Script en el código');
            }
            
            // Usamos text/plain para evitar el preflight de CORS en Google Apps Script
            const response = await fetch(SCRIPT_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'text/plain;charset=utf-8',
                },
                body: JSON.stringify(payload)
            });
            
            const result = await response.json();
            if (result.status === 'error') {
                throw new Error(result.message);
            }
            return result;
        }

        // Sincronizar reportes pendientes
        async function syncPendingReports() {
            const queue = JSON.parse(localStorage.getItem('reportQueue') || '[]');
            if (queue.length === 0) return;
            showStatus(`Sincronizando ${queue.length} reporte${queue.length > 1 ? 's' : ''} pendiente${queue.length > 1 ? 's' : ''}...`, 'loading');
            let successCount = 0;
            for (let i = 0; i < queue.length; i++) {
                try {
                    await sendData(queue[i]);
                    successCount++;
                } catch (e) {
                    console.error('Error sincronizando reporte:', e);
                }
            }
            queue.splice(0, successCount);
            localStorage.setItem('reportQueue', JSON.stringify(queue));
            if (successCount > 0) {
                showStatus(`${successCount} reporte${successCount > 1 ? 's' : ''} enviado${successCount > 1 ? 's' : ''} con éxito`, 'success');
                triggerConfetti();
            }
        }

        // Indicador de conexión
        function updateOnlineStatus() {
            const banner = document.getElementById('offlineBanner');
            if (!navigator.onLine) {
                banner.classList.remove('hidden');
            } else {
                banner.classList.add('hidden');
            }
        }

        window.addEventListener('online', () => { updateOnlineStatus(); syncPendingReports(); });
        window.addEventListener('offline', updateOnlineStatus);

        function resetForm() {
            form.reset();
            base64Image = null;
            currentCoords = { lat: null, lon: null };
            preview.classList.add('hidden');
            preview.src = '';
        }

        // Inicialización: verificar conexión, sincronizar pendientes y registrar Service Worker
        window.addEventListener('load', () => {
            updateOnlineStatus();
            if (navigator.onLine) syncPendingReports();
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('/sw.js').catch(err =>
                    console.warn('Service Worker no se pudo registrar:', err)
                );
            }
        });
    </script>
</body>
</html>
